<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DETRAN</title>
</head>
<body>
    <h1>Sistema de multas</h1>
    Velocidade do carro: <input type="number" name="txtvel" id="txtvel"> km/h
    <input type="button" value="Verificar" onclick="verificar()">
    <div id="retorno"></div>

    <script>
        function verificar(){
            var txtv = window.document.getElementById('txtvel')
            var retorno = window.document.getElementById('retorno')
            var vel = Number(txtv.value)
            retorno.innerHTML = `<p>Sua velocidade atual é de <strong>${vel}Km/h</strong>.</p>`
            if (vel > 60) {
                retorno.innerHTML = '<p>Você ultrapassou o limite de velocidade! <strong>MULTADO!</strong></p>'
            }
        }
    </script>
</body>
</html>
