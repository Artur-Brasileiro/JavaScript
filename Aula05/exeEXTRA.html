<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nacionalidade</title>
</head>
<body>
    <h1>Testando sua Nacionalidade</h1>
    Onde você nasceu: <input type="text" name="pais" id="ipais">
    <input type="button" value="Confirmar" onclick="avaliar()">
    <div id="retorno"></div>

    <script>
        function avaliar(){
            var reg = window.document.getElementById('ipais')
            var pais = String(reg.value)
            var retorno = window.document.getElementById('retorno')
            if (pais == 'Brasil'){
                retorno.innerHTML = 'Você é Brasileiro!'
            } else {
                retorno.innerHTML = 'Você é estrangeiro!'
            }
        }
    </script>
</body>
</html>
