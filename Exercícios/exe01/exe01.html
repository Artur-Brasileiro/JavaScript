<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hora do Dia</title>
    <style>
        *{
            font-family: Arial, Helvetica, sans-serif;
        }

        body{
            background-color: rgb(251, 199, 146);
        }

        h1{
            color: white;
            font-size: 3em;
            text-align: center;
        }

        main{
            width: 50%;
            height: 400px;
            background-color: white;
            margin: auto;
            border-radius: 10px;
            box-shadow: 3px 3px 0px rgba(0, 0, 0, 0.345);
        }

        main > h2{
            padding-top: 20px;
            text-align: center;
        }

        main > div > img{
            display: block;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            margin: auto;
        }

        p{
            color: white;
            text-align: center;
            font-size: 1em;
            padding-top: 10px;
        }
    </style>
</head>
<body id="body">
    <h1>Hora do Dia</h1>
    <main>
        <h2 id="horario">Agora são x horas.</h2>
        <div id="imagem">
            <img src="imagens/Amanhecer01.jpg" alt="Amanhecer">
        </div>
    </main>
    <p>Artur Morais Brasileiro</p>
    <script>
        var img = window.document.getElementById('imagem')
        var horario = window.document.getElementById('horario')
        var body = window.document.getElementById('body')
        var novo = new Date()
        var hora = novo.getHours()
        horario.innerHTML = (`Agora são ${hora} horas.`)

        if (hora >= 12 && hora < 18){
            img.innerHTML = ('<img src="imagens/Tarde.jpg" alt="Tarde">')
            body.style.background = '#7595F4'
        } else if (hora >= 18 && hora <= 24){
            img.innerHTML = ('<img src="imagens/Noite.jpg" alt="Noite">')
            body.style.background = '#000E24'
        }
    </script>
</body>
</html>
