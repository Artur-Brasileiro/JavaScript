<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            font: normal 20pt Arial;
        }
    </style>
</head>
<body>
    <script>
        var nome = window.prompt('Qual é seu nome?')
        var ano = Number(window.prompt('Em qual ano você nasceu?'))
        var atual = 2023
        var idade = String(atual - ano)
        document.write(`Seu nome é ${nome.toUpperCase()}, e você tem ${idade} anos!`)
    </script>
</body>
</html>
